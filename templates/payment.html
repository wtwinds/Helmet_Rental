<!DOCTYPE html>
<html>

<head>

    <title>Payment</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</head>

<body class="bg-light form-page">

    {% include 'navbar.html' %}

    <div class="container payment-container">

        <div class="payment-card">

            <h4 class="mb-4">Payment Summary</h4>

            <div class="mb-3">

                <p>Normal Helmet : <b>{{ normal }}</b> × ₹50</p>

                <p>Bluetooth Helmet : <b>{{ bluetooth }}</b> × ₹200</p>

                <p>HUD / Dashcam Helmet : <b>{{ hud }}</b> × ₹300</p>

                {% if session.get('damage_protection',0) > 0 %}
                <p>Damage Protection : <b>₹100</b></p>
                {% endif %}
            </div>

            <hr>

            <h3 class="mb-4">
                Total Amount : ₹{{ total_price }}
            </h3>

            <div class="text-center">

                <form action="/booking-success">
                    <button class="btn btn-dark px-4">
                        Confirm Payment
                    </button>
                </form>

            </div>

        </div>

    </div>

</body>

</html>
