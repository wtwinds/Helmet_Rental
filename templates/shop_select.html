<!DOCTYPE html>
<html>

<head>

    <title>Select Shop</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light">

    {% include 'navbar.html' %}

    <div class="container" style="padding-top:100px;">

        <div class="register-card">

            <h4 class="text-center mb-4">Select Two Wheeler Renting Shop</h4>

            <form action="/rider-info" method="GET">

                <div class="mb-3">

                    <select name="shop_name" class="form-select">

                        <option value="">Select Shop Name</option>

                        <option>Rent Rite</option>
                        <option>House hub</option>
                        <option>The Rental Expert</option>
                        <option>Dream rentals</option>
                        <option>Blue chip</option>
                        <option>Key stone</option>
                        <option>Rent Spire</option>
                        <option>Nova Vibe</option>

                    </select>

                </div>

                <div class="d-flex justify-content-center">

                    <button class="btn btn-dark">Next</button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
