<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container" style="padding-top:100px; max-width:400px;">

        <div class="card shadow p-4">

            <h4 class="text-center mb-3">Forgot Password</h4>

            {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger text-center">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/reset-password" method="POST">

                <div class="mb-3">
                    <input type="email" name="email" placeholder="Enter Email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <input type="text" name="security_answer" placeholder="Security Answer" class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <input type="password" name="new_password" placeholder="New Password" class="form-control" required>
                </div>

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success w-50">
                        Reset
                    </button>

                    <a href="/login" class="btn btn-secondary w-50">
                        Go Login
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
