<!DOCTYPE html>
<html>

<head>

    <title>Booking Complete</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="bg-light form-page">

    {% include 'navbar.html' %}

    <div class="container booking-container">

        <div class="booking-card">

            <h4 class="mb-3">Booking Complete!</h4>

            <h5 class="mb-4">Have a safe and Happy Ride!</h5>

            <div class="success-icon mb-4">
                <i class="bi bi-check-circle-fill"></i>
            </div>

            <button class="btn btn-dark mb-4">
                Ready to Ride
            </button>

            <form action="/save-feedback" method="POST">

                <h5 class="mb-3">Rate your experience</h5>

                <div class="rating-stars mb-3">

                    <i class="bi bi-star" data-value="1"></i>
                    <i class="bi bi-star" data-value="2"></i>
                    <i class="bi bi-star" data-value="3"></i>
                    <i class="bi bi-star" data-value="4"></i>
                    <i class="bi bi-star" data-value="5"></i>

                </div>

                <input type="hidden" name="rating" id="ratingValue">
                <div class="mb-3">

                    <textarea name="comment" class="form-control" placeholder="Comment / Feedback" rows="3"></textarea>

                </div>

                <button class="btn btn-dark px-4">
                    Submit Feedback
                </button>

            </form>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/rating.js') }}"></script>
</body>

</html>
