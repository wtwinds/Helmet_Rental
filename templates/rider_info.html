<!DOCTYPE html>
<html>

<head>

    <title>Rider Information</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light form-page">

    {% include 'navbar.html' %}

    <div class="container rider-container">

        <div class="rider-card">

            <h4 class="text-center mb-4">Rider Information</h4>

            {% with messages = get_flashed_messages(category_filter=["rider_success"]) %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-success text-center">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/save-rider" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <input type="text" name="fullname" placeholder="Full Name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <input type="text" name="contact" placeholder="Contact Number" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>ID Type</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Aadhar card">
                        <label class="form-check-label">Aadhar Card</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Driving license">
                        <label class="form-check-label">Driving License</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Passport">
                        <label class="form-check-label">Passport</label>
                    </div>

                </div>
                <div class="mb-3">
                    <label>Upload ID</label>
                    <input type="file" name="id_image" class="form-control" accept=".jpg,.jpeg,.png,.pdf">
                </div>

                <div class="mb-3">
                    <input type="text" name="hotel_name" placeholder="Rider Hotel Name" class="form-control">
                </div>

                <div class="mb-3">
                    <input type="text" name="room_no" placeholder="Enter Room No" class="form-control">
                </div>

                <!-- NORMAL HELMET -->
                <div class="mb-3">
                    <label>No of Normal Helmet (₹50 each)</label>
                    <select name="normal_helmet" class="form-select">
                        <option value="0">0</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>
                </div>

                <!-- SMART HELMET FILTER -->
                <div class="mb-3">
                    <label class="fw-bold">Smart Helmet Filter</label>

                    <!-- Bluetooth -->
                    <div class="mt-2">
                        <label>Bluetooth Helmet (₹200 each)</label>
                        <select name="bluetooth_helmet" class="form-select">
                            <option value="0">0</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                    </div>

                    <!-- HUD -->
                    <div class="mt-2">
                        <label>HUD / Dashcam Helmet (₹300 each)</label>
                        <select name="hud_helmet" class="form-select">
                            <option value="0">0</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold">Protection Add-on</label>

                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="damage_protection" value="yes">
                        <label class="form-check-label">
                            Damage Protection Waiver (₹100 one-time)
                            <br>
                            <small class="text-muted">
                                Covers accidental scratches & minor damages
                            </small>
                        </label>
                    </div>
                </div>

                <div class="text-center">
                    <button class="btn btn-dark">Next</button>
                </div>

            </form>

        </div>

    </div>

    <script>
        setTimeout(function () {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => alert.style.display = 'none');
        }, 3000);
    </script>

    <script src="{{ url_for('static', filename='js/helmet-limit.js') }}"></script>
</body>

</html>
