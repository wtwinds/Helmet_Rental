<!DOCTYPE html>
<html>

<head>
    <title>Rider Information</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light form-page">

    {% include 'navbar.html' %}

    <div class="container rider-container">
        <div class="rider-card">

            <h4 class="text-center mb-4">Rider Information</h4>

            {% with messages = get_flashed_messages(category_filter=["rider_success"]) %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-success text-center">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/save-rider" method="POST" enctype="multipart/form-data">

                <!-- NAME -->
                <div class="mb-3">
                    <input type="text" name="fullname" value="{{ data.get('fullname','') }}" placeholder="Full Name"
                        class="form-control" required>
                </div>

                <!-- CONTACT -->
                <div class="mb-3">
                    <input type="text" name="contact" value="{{ data.get('contact','') }}" placeholder="Contact Number"
                        class="form-control" required>
                </div>

                <!-- ID TYPE -->
                <div class="mb-3">
                    <label>ID Type</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Aadhar card" {% if
                            data.get('id_type')=='Aadhar card' %}checked{% endif %}>
                        <label class="form-check-label">Aadhar Card</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Driving license" {% if
                            data.get('id_type')=='Driving license' %}checked{% endif %}>
                        <label class="form-check-label">Driving License</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="id_type" value="Passport" {% if
                            data.get('id_type')=='Passport' %}checked{% endif %}>
                        <label class="form-check-label">Passport</label>
                    </div>

                </div>

                <!-- FILE -->
                <div class="mb-3">
                    <label>Upload ID</label>
                    <input type="file" name="id_image" class="form-control">
                </div>

                <!-- HOTEL -->
                <div class="mb-3">
                    <input type="text" name="hotel_name" value="{{ data.get('hotel_name','') }}"
                        placeholder="Rider Hotel Name" class="form-control">
                </div>

                <!-- ROOM -->
                <div class="mb-3">
                    <input type="text" name="room_no" value="{{ data.get('room_no','') }}" placeholder="Enter Room No"
                        class="form-control">
                </div>

                <!-- NORMAL -->
                <div class="mb-3">
                    <label>No of Normal Helmet (₹50 each)</label>
                    <select name="normal_helmet" class="form-select">
                        <option value="">Select</option>
                        <option value="1" {% if data.get('normal_helmet')==1 %}selected{% endif %}>1</option>
                        <option value="2" {% if data.get('normal_helmet')==2 %}selected{% endif %}>2</option>
                    </select>
                </div>

                <!-- SMART -->
                <div class="mb-3">
                    <label class="fw-bold">Smart Helmet Filter</label>

                    <div class="mt-2">
                        <label>Bluetooth Helmet (₹200 each)</label>
                        <select name="bluetooth_helmet" class="form-select">
                            <option value="">Select</option>
                            <option value="1" {% if data.get('bluetooth_helmet')==1 %}selected{% endif %}>1</option>
                            <option value="2" {% if data.get('bluetooth_helmet')==2 %}selected{% endif %}>2</option>
                        </select>
                    </div>

                    <div class="mt-2">
                        <label>HUD / Dashcam Helmet (₹300 each)</label>
                        <select name="hud_helmet" class="form-select">
                            <option value="">Select</option>
                            <option value="1" {% if data.get('hud_helmet')==1 %}selected{% endif %}>1</option>
                            <option value="2" {% if data.get('hud_helmet')==2 %}selected{% endif %}>2</option>
                        </select>
                    </div>
                </div>

                <!-- DAMAGE -->
                <div class="mb-3">
                    <label class="fw-bold">Protection Add-on</label>

                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="damage_protection" value="yes" {% if
                            data.get('damage_protection')==100 %}checked{% endif %}>
                        <label class="form-check-label">
                            Damage Protection Waiver (₹100 one-time)
                            <br>
                            <small class="text-muted">
                                Covers accidental scratches & minor damages
                            </small>
                        </label>
                    </div>
                </div>

                <!-- BUTTON -->
                <div class="text-center">
                    <button class="btn btn-dark">Next</button>
                </div>

            </form>

        </div>
    </div>

    <script>
        setTimeout(function () {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => alert.style.display = 'none');
        }, 3000);
    </script>

    <script src="{{ url_for('static', filename='js/helmet-limit.js') }}"></script>

</body>

</html>
