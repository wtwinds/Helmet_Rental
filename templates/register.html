<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light">

    {% include 'navbar.html' %}

    <div class="container">

        <div class="register-card">

            {% with messages = get_flashed_messages(category_filter=["register_success"]) %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-success text-center">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="text-center mb-4">
                <h3 class="mt-2">User Registration</h3>
            </div>

            <form action="/submit" method="POST">

                <div class="mb-3">
                    <input type="text" name="name" placeholder="Full Name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <input type="email" name="email" placeholder="Email Address" class="form-control" required>
                </div>

                <div class="mb-3">
                    <input type="text" name="phone" placeholder="Phone Number" class="form-control" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" placeholder="Password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Security Question</label>
                    <select name="security_question" class="form-select" required>
                        <option value="">Select Question</option>
                        <option value="pet">What is your pet name?</option>
                        <option value="school">Your school name?</option>
                        <option value="city">Your birth city?</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="text" name="security_answer" placeholder="Your Answer" class="form-control" required>
                </div>

                <button class="btn btn-dark w-100">Register</button>

            </form>

        </div>

    </div>
    <script>
        setTimeout(function () {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => alert.style.display = 'none');
        }, 3000);
    </script>
</body>

</html>
