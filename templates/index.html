<!DOCTYPE html>
<html>

<head>

    <title>Helmet Rental App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="home-bg">

    {% include 'navbar.html' %}

    <div class="container text-center">

        <div class="app-box">

            <img src="{{ url_for('static', filename='images/helmet.jpg') }}" class="helmet-img">

            <h2 class="mt-3">Helmet Rental App</h2>

            <p class="text-muted">Find helmets near your location</p>

            <button onclick="requestLocation()" class="btn btn-dark mt-3">
                Enable Location
            </button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/location.js') }}"></script>

</body>

</html>
